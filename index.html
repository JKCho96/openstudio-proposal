<script>
(function(){
  // 열람(open)은 여기서 안 쏨 — 스캐너/프리페치가 이 진입페이지만 스쳐도 가짜 '랜딩 읽음'이 찍히므로.
  // 실제 제안서(phone/desktop)에서 사람이 3초 이상 머물 때 track.js가 open을 쏜다.
  var qs = location.search || "";
  var m = (Math.min(window.innerWidth, window.innerHeight) < 700) || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  location.replace((m ? 'phone.html' : 'desktop.html') + qs);
})();
</script></body></html>
